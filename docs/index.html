<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard — Offres Data / IA</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="colors_and_type.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-1);
      color: var(--fg-1);
      font-family: var(--font-sans);
      font-size: var(--fs-body);
      line-height: var(--lh-body);
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 48px 48px 80px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-left img { height: 28px; }
    .header h2 {
      font-size: var(--fs-h3);
      letter-spacing: var(--ls-h2);
      line-height: 1;
    }
    .header-meta {
      font-size: var(--fs-caption);
      color: var(--fg-3);
      letter-spacing: var(--ls-upper);
      text-transform: uppercase;
    }

    /* ── Card base ── */
    .card {
      background: var(--bg-3);
      border: 1px solid var(--border-warm);
      padding: 32px;
      box-shadow: var(--shadow-golden-sm);
      min-width: 0;
    }
    .card-title {
      font-size: var(--fs-tiny);
      text-transform: uppercase;
      letter-spacing: var(--ls-upper);
      color: var(--fg-3);
      margin-bottom: 20px;
    }

    /* ── Explorer / Filter card ── */
    .explorer-card { margin-bottom: 32px; }
    .explorer-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .explorer-header .card-title { margin-bottom: 0; }

    .filter-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px 28px;
      align-items: start;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }
    .filter-group--input { flex: 1 1 200px; }
    .filter-group--auto { flex: 0 0 auto; }

    /* ── Autocomplete ── */
    .autocomplete { position: relative; }
    .autocomplete-list {
      position: absolute;
      top: calc(100% + 2px);
      left: 0;
      right: 0;
      background: var(--bg-3);
      border: 1px solid var(--border-warm);
      box-shadow: var(--shadow-golden-sm);
      max-height: 280px;
      overflow-y: auto;
      z-index: 20;
      display: none;
    }
    .autocomplete-list.show { display: block; }
    .autocomplete-item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: var(--fs-caption);
      color: var(--fg-1);
      border-bottom: 1px solid rgba(127,99,21,0.05);
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover,
    .autocomplete-item.active { background: var(--cream); color: var(--mistral-orange); }
    .autocomplete-empty {
      padding: 8px 12px;
      font-size: var(--fs-caption);
      color: var(--fg-3);
      font-style: italic;
    }

    .filter-label {
      font-size: var(--fs-tiny);
      text-transform: uppercase;
      letter-spacing: var(--ls-upper);
      color: var(--fg-3);
    }

    /* ── Chips ── */
    .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      padding: 6px 14px;
      border: 1px solid var(--border-warm);
      background: var(--bg-3);
      color: var(--fg-2);
      font-family: var(--font-sans);
      font-size: var(--fs-caption);
      cursor: pointer;
      transition: all 140ms ease;
    }
    .chip:hover { border-color: var(--mistral-orange); color: var(--mistral-orange); }
    .chip.active { background: var(--mistral-orange); border-color: var(--mistral-orange); color: #fff; }

    /* ── Filter controls ── */
    .filter-select,
    .filter-input {
      font-family: var(--font-sans);
      font-size: var(--fs-caption);
      padding: 8px 12px;
      border: 1px solid var(--border-input);
      background: var(--bg-3);
      color: var(--fg-1);
      outline: none;
      transition: border-color 180ms ease;
      min-width: 150px;
    }
    .filter-input { width: 100%; }
    .filter-select:focus,
    .filter-input:focus {
      border-color: var(--mistral-orange);
      box-shadow: 0 0 0 3px var(--accent-ring);
    }

    .enrichment-note {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(127,99,21,0.08);
      font-size: var(--fs-tiny);
      color: var(--fg-3);
    }

    /* ── KPI row ── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .kpi {
      background: var(--bg-3);
      border: 1px solid var(--border-warm);
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .kpi-label {
      font-size: var(--fs-tiny);
      text-transform: uppercase;
      letter-spacing: var(--ls-upper);
      color: var(--fg-3);
    }
    .kpi-value {
      font-size: var(--fs-h2);
      letter-spacing: var(--ls-h2);
      line-height: 1;
    }
    .kpi-sub { font-size: var(--fs-caption); color: var(--fg-3); }

    /* ── Charts ── */
    .top-charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }
    .chart-line-card { grid-column: 1 / -1; }

    .chart-box {
      position: relative;
      height: 240px;
      width: 100%;
    }
    .chart-box canvas {
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Tables row ── */
    .tables-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: var(--fs-tiny);
      text-transform: uppercase;
      letter-spacing: var(--ls-upper);
      color: var(--fg-3);
      padding: 0 0 12px;
      border-bottom: 1px solid var(--border-warm);
      font-weight: var(--fw-regular);
    }
    td {
      padding: 10px 0;
      border-bottom: 1px solid rgba(127,99,21,0.06);
      font-size: var(--fs-caption);
    }
    td:last-child { text-align: right; font-variant-numeric: tabular-nums; }

    .rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      font-size: 11px;
      background: var(--cream);
      color: var(--fg-2);
      margin-right: 8px;
    }
    .bar-cell { display: flex; align-items: center; gap: 10px; }
    .bar-track {
      flex: 1;
      height: 6px;
      background: var(--cream);
      position: relative;
      overflow: hidden;
    }
    .bar-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: var(--mistral-orange);
      transition: width 0.4s ease;
    }

    /* ── Offers list ── */
    .offers-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .offers-header .card-title { margin-bottom: 0; }

    .offer-item {
      display: grid;
      grid-template-columns: 1fr 180px 150px 90px 80px 160px auto;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(127,99,21,0.06);
      font-size: var(--fs-caption);
    }
    .offer-item:first-child { border-top: 1px solid var(--border-warm); }

    .offer-title {
      font-size: var(--fs-body);
      color: var(--fg-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .offer-company {
      color: var(--fg-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .offer-lieu {
      color: var(--fg-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .offer-contrat {
      display: inline-block;
      padding: 3px 10px;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: var(--ls-upper);
      background: var(--cream);
      color: var(--fg-2);
    }
    .offer-salaire {
      color: var(--fg-3);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .offer-link a {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: var(--fs-tiny);
      text-transform: uppercase;
      letter-spacing: var(--ls-upper);
      color: var(--mistral-orange);
      text-decoration: none;
      transition: color 180ms ease;
    }
    .offer-link a:hover { color: var(--mistral-flame); }
    .offer-link a svg { width: 14px; height: 14px; }

    /* ── Experience badges ── */
    .exp-badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .exp-badge--junior { background: #dcfce7; color: #16a34a; }
    .exp-badge--mid    { background: #dbeafe; color: #1d4ed8; }
    .exp-badge--senior { background: #ffedd5; color: #c2410c; }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }
    .pagination button {
      background: var(--bg-3);
      border: 1px solid var(--border-warm);
      padding: 8px 16px;
      font-family: var(--font-sans);
      font-size: var(--fs-caption);
      cursor: pointer;
      color: var(--fg-1);
      transition: background 180ms ease;
    }
    .pagination button:hover { background: var(--cream); }
    .pagination button:disabled { opacity: 0.35; cursor: default; }
    .pagination button:disabled:hover { background: var(--bg-3); }
    .pagination span { font-size: var(--fs-caption); color: var(--fg-3); }

    /* ── Loading / error ── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 0;
      gap: 16px;
      color: var(--fg-3);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--cream);
      border-top-color: var(--mistral-orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state {
      background: #fff5f0;
      border: 1px solid rgba(250,82,15,0.2);
      padding: 20px 28px;
      color: var(--mistral-orange);
      font-size: var(--fs-caption);
    }

    /* ── Responsive ── */
    @media (max-width: 960px) {
      .shell { padding: 32px 24px 64px; }
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
      .top-charts { grid-template-columns: 1fr; }
      .chart-line-card { grid-column: auto; }
      .tables-row { grid-template-columns: 1fr; }
      .offer-item { grid-template-columns: 1fr; gap: 4px; }
      .filter-group--input { flex-basis: 100%; }
    }
    @media (max-width: 600px) {
      .shell { padding: 16px 12px 40px; }

      .header { margin-bottom: 24px; flex-wrap: wrap; gap: 8px; }
      .header-left img { height: 18px; }
      .header h2 { font-size: 1rem; letter-spacing: 0; }
      .header-meta { font-size: 10px; }

      .card { padding: 16px; }
      .explorer-card { margin-bottom: 20px; }

      .kpi-row { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
      .kpi { padding: 14px 16px; gap: 4px; }
      .kpi-value { font-size: 1.4rem; }

      .top-charts { gap: 10px; margin-bottom: 20px; }
      .chart-box { height: 180px; }

      .filter-grid { gap: 14px 0; }
      .filter-group--auto { flex-basis: 100%; }
      .chip { padding: 5px 10px; font-size: 11px; }
      .filter-select,
      .filter-input { font-size: 13px; }

      .tables-row { gap: 10px; margin-bottom: 20px; }

      .offer-item { padding: 10px 0; }
      .offer-title { font-size: 13px; }
      .offer-company,
      .offer-lieu { font-size: 12px; }

      .pagination button { padding: 6px 12px; font-size: 12px; }
    }

    /* ── Gradient footer ── */
    .footer-bar {
      height: 6px;
      background: var(--block-gradient);
      margin-top: 48px;
    }
  </style>
</head>
<body>
  <div class="shell" id="app">
    <div class="loading-state" id="loading">
      <div class="spinner"></div>
      <span>Chargement des offres…</span>
    </div>
  </div>

  <script>
    /* ================================================================
       CONFIG
       ================================================================ */
    const SUPABASE_URL = 'https://bsqkthbemrtjfrjxdjbg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzcWt0aGJlbXJ0amZyanhkamJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODU4NjQsImV4cCI6MjA5MzA2MTg2NH0.7o8PihUD586UwjE__wvBvUOmED4yzyEqhOggaG4-T9c';
    const TABLE     = 'offres';
    const PAGE_SIZE = 15;

    /* ================================================================
       DATA LAYER
       ================================================================ */
    async function fetchAllOffres() {
      const allRows = [];
      let from = 0;
      const step = 1000;
      while (true) {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=date_creation.desc&offset=${from}&limit=${step}`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        if (!res.ok) throw new Error(`Supabase ${res.status}: ${res.statusText}`);
        const rows = await res.json();
        allRows.push(...rows);
        if (rows.length < step) break;
        from += step;
      }
      return allRows;
    }

    /* ================================================================
       HELPERS
       ================================================================ */
    function countBy(arr, key) {
      const m = {};
      arr.forEach(r => { const v = r[key] || '—'; m[v] = (m[v] || 0) + 1; });
      return Object.entries(m).sort((a, b) => b[1] - a[1]);
    }

    function fmtNum(n) { return n.toLocaleString('fr-FR'); }

    function fmtSalary(row) {
      if (row.salaire_min && row.salaire_max) return `${fmtNum(row.salaire_min)} — ${fmtNum(row.salaire_max)} €`;
      if (row.salaire_min) return `≥ ${fmtNum(row.salaire_min)} €`;
      if (row.salaire_max) return `≤ ${fmtNum(row.salaire_max)} €`;
      if (row.salaire_libelle) return row.salaire_libelle;
      return '—';
    }

    function dayStr(isoStr) { return isoStr ? isoStr.slice(0, 10) : null; }

    const arrowSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>`;

    const contratLabels = {
      CDI: 'CDI',
      CDD: 'CDD',
      MIS: 'Intérim',
      LIB: 'Libéral',
      FRA: 'Franchise',
      SAI: 'Saisonnier',
      CCE: 'Contrat de chantier',
    };
    function contratLabel(code) {
      if (!code) return '—';
      if (code === '__ALT__') return 'Alternance';
      return contratLabels[code] || code;
    }
    function effectiveContratLabel(row) {
      if (row.is_alternance === true) return 'Alternance';
      return contratLabel(row.type_contrat);
    }

    const IDF_DEPTS = new Set(['75', '77', '78', '91', '92', '93', '94', '95']);
    function lieuDept(lieu) {
      if (!lieu) return null;
      const m = lieu.match(/^\s*(\d{2,3})/);
      return m ? m[1] : null;
    }
    function isIDF(lieu) {
      const d = lieuDept(lieu);
      return d ? IDF_DEPTS.has(d) : false;
    }

    /* ================================================================
       AUTOCOMPLETE
       ================================================================ */
    function setupAutocomplete(inputId, listId, allValues, getCurrent, onChange) {
      const input = document.getElementById(inputId);
      const list  = document.getElementById(listId);
      if (!input || !list) return;

      const renderSuggestions = (q) => {
        const ql = q.toLowerCase().trim();
        const matches = ql
          ? allValues.filter(v => v.toLowerCase().includes(ql)).slice(0, 10)
          : allValues.slice(0, 10);
        if (!matches.length) {
          list.innerHTML = '<div class="autocomplete-empty">Aucun résultat</div>';
        } else {
          list.innerHTML = matches.map(v =>
            `<div class="autocomplete-item" data-val="${v.replace(/"/g, '&quot;')}">${v}</div>`
          ).join('');
        }
        list.classList.add('show');
      };

      input.addEventListener('focus', () => renderSuggestions(input.value));
      input.addEventListener('input', () => {
        renderSuggestions(input.value);
        onChange(input.value);
      });
      list.addEventListener('mousedown', (e) => {
        const item = e.target.closest('.autocomplete-item');
        if (!item) return;
        e.preventDefault();
        input.value = item.dataset.val;
        list.classList.remove('show');
        onChange(input.value);
      });
      input.addEventListener('blur', () => {
        setTimeout(() => list.classList.remove('show'), 120);
      });
    }

    /* ================================================================
       STATE
       ================================================================ */
    let allData    = [];
    let filtered   = [];
    let offersPage = 0;

    let filterTitle   = '';
    let filterContrat = '';
    let filterExp     = '';
    let filterLieu    = '';
    let filterCompany = '';
    let filterAlternance = 'exclude'; // 'all' | 'exclude' | 'only'
    let filterRegion = 'all';         // 'all' | 'idf' | 'province'
    let filterDateFrom = '';
    let filterDateTo   = '';

    /* ================================================================
       FILTERS
       ================================================================ */
    function applyFilters() {
      filtered = allData.filter(r => {
        if (filterTitle) {
          const q = filterTitle.toLowerCase();
          if (!(r.intitule || '').toLowerCase().includes(q)) return false;
        }
        if (filterCompany) {
          const q = filterCompany.toLowerCase();
          if (!(r.entreprise_nom || '').toLowerCase().includes(q)) return false;
        }
        if (filterLieu) {
          const q = filterLieu.toLowerCase();
          if (!(r.lieu_travail || '').toLowerCase().includes(q)) return false;
        }
        if (filterContrat && r.type_contrat !== filterContrat) return false;
        if (filterExp     && r.experience_level !== filterExp)  return false;
        if (filterAlternance === 'exclude' && r.is_alternance === true)  return false;
        if (filterAlternance === 'only'    && r.is_alternance !== true)  return false;
        if (filterRegion === 'idf'      && !isIDF(r.lieu_travail)) return false;
        if (filterRegion === 'province' &&  isIDF(r.lieu_travail)) return false;
        if (filterDateFrom && (!r.date_creation || r.date_creation.slice(0, 10) < filterDateFrom)) return false;
        if (filterDateTo   && (!r.date_creation || r.date_creation.slice(0, 10) > filterDateTo))   return false;
        return true;
      });
      offersPage = 0;
      const active = document.activeElement;
      const focusId = active && active.tagName === 'INPUT' ? active.id : null;
      const selStart = focusId ? active.selectionStart : null;
      const selEnd   = focusId ? active.selectionEnd   : null;
      render(filtered);
      if (focusId) {
        const el = document.getElementById(focusId);
        if (el) {
          el.focus();
          try { el.setSelectionRange(selStart, selEnd); } catch (_) {}
        }
      }
    }

    /* ================================================================
       RENDER
       ================================================================ */
    function render(data) {
      const shell = document.getElementById('app');

      const contratCounts = {};
      data.forEach(r => {
        const k = r.is_alternance === true ? '__ALT__' : (r.type_contrat || '—');
        contratCounts[k] = (contratCounts[k] || 0) + 1;
      });
      const contrats = Object.entries(contratCounts).sort((a, b) => b[1] - a[1]);
      const salaires          = data.filter(r => r.salaire_min || r.salaire_max);
      const avgSal            = salaires.length
        ? Math.round(salaires.reduce((s, r) => s + ((r.salaire_min || r.salaire_max || 0) + (r.salaire_max || r.salaire_min || 0)) / 2, 0) / salaires.length)
        : null;
      const lieux             = countBy(data, 'lieu_travail');
      const uniqueEntreprises = new Set(data.map(r => r.entreprise_nom).filter(Boolean)).size;

      const parJour = {};
      data.forEach(r => { const d = dayStr(r.date_collecte); if (d) parJour[d] = (parJour[d] || 0) + 1; });
      const joursSorted = Object.keys(parJour).sort();

      const parMois = new Array(12).fill(0);
      data.forEach(r => { if (r.date_creation) parMois[+r.date_creation.slice(5, 7) - 1]++; });

      const parJourSemaine = [0, 0, 0, 0, 0, 0, 0]; // Lun→Dim
      data.forEach(r => {
        if (!r.date_creation) return;
        const day = new Date(r.date_creation).getDay(); // 0=Dim
        parJourSemaine[day === 0 ? 6 : day - 1]++;
      });

      const topEntreprises = countBy(data, 'entreprise_nom').slice(0, 8);
      const topLieux       = lieux.slice(0, 8);
      const maxEnt         = topEntreprises[0]?.[1] || 1;
      const maxLieu        = topLieux[0]?.[1] || 1;

      const allContrats   = [...new Set(allData.map(r => r.type_contrat).filter(Boolean))].sort();
      const allLieuxList  = countBy(allData, 'lieu_travail').filter(([l]) => l !== '—').map(([l]) => l);
      const allCompanies  = countBy(allData, 'entreprise_nom').filter(([c]) => c !== '—').map(([c]) => c);
      const enriched      = allData.filter(r => r.experience_level != null).length;

      const sortedOffers = [...data].sort((a, b) => (b.date_creation || '').localeCompare(a.date_creation || ''));
      const pageOffers   = sortedOffers.slice(offersPage * PAGE_SIZE, (offersPage + 1) * PAGE_SIZE);
      const totalPages   = Math.ceil(sortedOffers.length / PAGE_SIZE);

      const expLabels = { junior: 'Junior', mid: 'Mid', senior: 'Senior' };

      shell.innerHTML = `
        <header class="header">
          <div class="header-left">
            <img src="assets/logo-block.svg" alt="logo"/>
            <h2>Offres Data / IA</h2>
          </div>
          <span class="header-meta">France Travail · mis à jour ${joursSorted.length ? joursSorted[joursSorted.length - 1] : '—'}</span>
        </header>

        <div class="card explorer-card">
          <div class="explorer-header">
            <div class="card-title">Explorer les offres</div>
            <span class="kpi-sub">${fmtNum(data.length)} offre${data.length !== 1 ? 's' : ''} sélectionnée${data.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="filter-grid">
            <div class="filter-group filter-group--auto">
              <div class="filter-label">Niveau d'expérience</div>
              <div class="chip-row" id="exp-chips">
                ${[['', 'Tous'], ['junior', 'Junior'], ['mid', 'Mid'], ['senior', 'Senior']].map(([v, l]) =>
                  `<button class="chip${filterExp === v ? ' active' : ''}" data-val="${v}">${l}</button>`
                ).join('')}
              </div>
            </div>
            <div class="filter-group filter-group--auto">
              <div class="filter-label">Type de contrat</div>
              <select id="contrat-select" class="filter-select">
                <option value="">Tous</option>
                ${allContrats.map(c => `<option value="${c}" ${c === filterContrat ? 'selected' : ''}>${contratLabel(c)}</option>`).join('')}
              </select>
            </div>
            <div class="filter-group filter-group--auto">
              <div class="filter-label">Alternance</div>
              <div class="chip-row" id="alt-chips">
                ${[['all', 'Toutes'], ['exclude', 'Hors alternance'], ['only', 'Alternance']].map(([v, l]) =>
                  `<button class="chip${filterAlternance === v ? ' active' : ''}" data-val="${v}">${l}</button>`
                ).join('')}
              </div>
            </div>
            <div class="filter-group filter-group--auto">
              <div class="filter-label">Région</div>
              <div class="chip-row" id="region-chips">
                ${[['all', 'Toutes'], ['idf', 'Île-de-France'], ['province', 'Province']].map(([v, l]) =>
                  `<button class="chip${filterRegion === v ? ' active' : ''}" data-val="${v}">${l}</button>`
                ).join('')}
              </div>
            </div>
            <div class="filter-group filter-group--input">
              <div class="filter-label">Localisation</div>
              <div class="autocomplete">
                <input type="text" id="lieu-input" class="filter-input" placeholder="Paris, Lyon…" autocomplete="off" value="${filterLieu.replace(/"/g, '&quot;')}"/>
                <div class="autocomplete-list" id="lieu-suggestions"></div>
              </div>
            </div>
            <div class="filter-group filter-group--input">
              <div class="filter-label">Entreprise</div>
              <div class="autocomplete">
                <input type="text" id="company-input" class="filter-input" placeholder="Capgemini, BNP…" autocomplete="off" value="${filterCompany.replace(/"/g, '&quot;')}"/>
                <div class="autocomplete-list" id="company-suggestions"></div>
              </div>
            </div>
            <div class="filter-group filter-group--input">
              <div class="filter-label">Titre du poste</div>
              <input type="text" id="title-input" class="filter-input" placeholder="Data Scientist…" value="${filterTitle.replace(/"/g, '&quot;')}"/>
            </div>
            <div class="filter-group filter-group--auto">
              <div class="filter-label">Date de début</div>
              <input type="date" id="date-from-input" class="filter-input" value="${filterDateFrom}" style="min-width:150px"/>
            </div>
            <div class="filter-group filter-group--auto">
              <div class="filter-label">Date de fin</div>
              <input type="date" id="date-to-input" class="filter-input" value="${filterDateTo}" style="min-width:150px"/>
            </div>
          </div>
          ${enriched > 0
            ? `<div class="enrichment-note">Niveau d'expérience renseigné pour ${fmtNum(enriched)} offre${enriched !== 1 ? 's' : ''} sur ${fmtNum(allData.length)}</div>`
            : ''}
        </div>

        <div class="kpi-row">
          <div class="kpi">
            <span class="kpi-label">Offres sélectionnées</span>
            <span class="kpi-value">${fmtNum(data.length)}</span>
            <span class="kpi-sub">${contrats[0] ? contrats[0][1] + ' ' + contratLabel(contrats[0][0]) : 'aucun résultat'}</span>
          </div>
          <div class="kpi">
            <span class="kpi-label">Entreprises</span>
            <span class="kpi-value">${fmtNum(uniqueEntreprises)}</span>
            <span class="kpi-sub">recruteurs uniques</span>
          </div>
          <div class="kpi">
            <span class="kpi-label">Salaire moyen</span>
            <span class="kpi-value">${avgSal ? fmtNum(avgSal) + ' €' : '—'}</span>
            <span class="kpi-sub">${salaires.length} offres renseignées</span>
          </div>
          <div class="kpi">
            <span class="kpi-label">Localisations</span>
            <span class="kpi-value">${fmtNum(lieux.length)}</span>
            <span class="kpi-sub">${lieux[0] ? lieux[0][0] + ' en tête' : ''}</span>
          </div>
        </div>

        <div class="top-charts">
          <div class="card chart-line-card">
            <div class="card-title">Offres collectées par jour</div>
            <div class="chart-box"><canvas id="chart-line"></canvas></div>
          </div>
          <div class="card">
            <div class="card-title">Offres par mois</div>
            <div class="chart-box"><canvas id="chart-month"></canvas></div>
          </div>
          <div class="card">
            <div class="card-title">Offres par jour de la semaine</div>
            <div class="chart-box"><canvas id="chart-weekday"></canvas></div>
          </div>
          <div class="card">
            <div class="card-title">Répartition par contrat</div>
            <div class="chart-box"><canvas id="chart-pie"></canvas></div>
          </div>
          <div class="card">
            <div class="card-title">Niveau d'expérience</div>
            <div class="chart-box"><canvas id="chart-exp"></canvas></div>
          </div>
        </div>

        <div class="tables-row">
          <div class="card">
            <div class="card-title">Top entreprises</div>
            <table>
              <thead><tr><th>Entreprise</th><th style="text-align:right">Offres</th></tr></thead>
              <tbody>
                ${topEntreprises.map(([name, count], i) => `
                  <tr>
                    <td><div class="bar-cell"><span class="rank">${i + 1}</span><span>${name}</span></div></td>
                    <td>
                      <div class="bar-cell" style="justify-content:flex-end">
                        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count / maxEnt * 100)}%"></div></div>
                        <span>${count}</span>
                      </div>
                    </td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
          <div class="card">
            <div class="card-title">Top localisations</div>
            <table>
              <thead><tr><th>Lieu</th><th style="text-align:right">Offres</th></tr></thead>
              <tbody>
                ${topLieux.map(([name, count], i) => `
                  <tr>
                    <td><div class="bar-cell"><span class="rank">${i + 1}</span><span>${name}</span></div></td>
                    <td>
                      <div class="bar-cell" style="justify-content:flex-end">
                        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count / maxLieu * 100)}%"></div></div>
                        <span>${count}</span>
                      </div>
                    </td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="offers-header">
            <div class="card-title">Dernières offres</div>
            <span class="kpi-sub">${fmtNum(sortedOffers.length)} résultats</span>
          </div>
          ${pageOffers.map(r => {
            const lvl = r.experience_level;
            const badge = lvl && lvl !== 'unknown'
              ? `<span class="exp-badge exp-badge--${lvl}">${expLabels[lvl] || lvl}</span>`
              : '';
            return `
            <div class="offer-item">
              <span class="offer-title" title="${(r.intitule || '').replace(/"/g, '&quot;')}">${r.intitule || '—'}</span>
              <span class="offer-company">${r.entreprise_nom || '—'}</span>
              <span class="offer-lieu">${r.lieu_travail || '—'}</span>
              <span class="offer-contrat">${effectiveContratLabel(r)}</span>
              <span>${badge}</span>
              <span class="offer-salaire">${fmtSalary(r)}</span>
              <span class="offer-link"><a href="https://candidat.francetravail.fr/offres/recherche/detail/${r.id}" target="_blank" rel="noopener">Voir ${arrowSvg}</a></span>
            </div>`;
          }).join('')}
          ${totalPages > 1 ? `
          <div class="pagination">
            <button id="prev-btn" ${offersPage === 0 ? 'disabled' : ''}>← Précédent</button>
            <span>${offersPage + 1} / ${totalPages}</span>
            <button id="next-btn" ${offersPage >= totalPages - 1 ? 'disabled' : ''}>Suivant →</button>
          </div>` : ''}
        </div>

        <div class="footer-bar"></div>
      `;

      document.getElementById('title-input')?.addEventListener('input', debounce(e => {
        filterTitle = e.target.value;
        applyFilters();
      }, 250));
      document.getElementById('contrat-select')?.addEventListener('change', e => {
        filterContrat = e.target.value;
        applyFilters();
      });
      document.querySelectorAll('#exp-chips .chip').forEach(btn => {
        btn.addEventListener('click', () => {
          filterExp = btn.dataset.val;
          applyFilters();
        });
      });
      document.querySelectorAll('#alt-chips .chip').forEach(btn => {
        btn.addEventListener('click', () => {
          filterAlternance = btn.dataset.val;
          applyFilters();
        });
      });
      document.querySelectorAll('#region-chips .chip').forEach(btn => {
        btn.addEventListener('click', () => {
          filterRegion = btn.dataset.val;
          applyFilters();
        });
      });

      const debouncedApply = debounce(applyFilters, 250);
      setupAutocomplete('lieu-input', 'lieu-suggestions', allLieuxList, () => filterLieu, (v) => {
        filterLieu = v;
        debouncedApply();
      });
      setupAutocomplete('company-input', 'company-suggestions', allCompanies, () => filterCompany, (v) => {
        filterCompany = v;
        debouncedApply();
      });
      document.getElementById('prev-btn')?.addEventListener('click', () => { offersPage--; render(filtered); });
      document.getElementById('next-btn')?.addEventListener('click', () => { offersPage++; render(filtered); });
      document.getElementById('date-from-input')?.addEventListener('change', e => { filterDateFrom = e.target.value; applyFilters(); });
      document.getElementById('date-to-input')?.addEventListener('change',   e => { filterDateTo   = e.target.value; applyFilters(); });

      renderLineChart(joursSorted, joursSorted.map(d => parJour[d]));
      const MOIS_LABELS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
      renderBarMonthChart(MOIS_LABELS, parMois);
      renderBarWeekdayChart(parJourSemaine);
      renderPieChart(contrats);
      renderExpChart(data);
    }

    /* ================================================================
       CHARTS
       ================================================================ */
    const chartColors = ['#fa520f', '#ff8105', '#ffa110', '#ffb83e', '#ffd06a', '#ffe295', '#ffd900', '#1f1f1f'];

    function renderLineChart(labels, values) {
      const ctx = document.getElementById('chart-line');
      if (!ctx) return;
      new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: values,
            borderColor: '#fa520f',
            backgroundColor: 'rgba(250,82,15,0.08)',
            fill: true,
            tension: 0.35,
            pointRadius: 3,
            pointBackgroundColor: '#fa520f',
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              grid: { display: false },
              ticks: { font: { family: 'Arial', size: 11 }, color: '#9c9c9c', maxTicksLimit: 12 }
            },
            y: {
              beginAtZero: true,
              grid: { color: 'rgba(127,99,21,0.06)' },
              ticks: { font: { family: 'Arial', size: 11 }, color: '#9c9c9c' }
            }
          }
        }
      });
    }

    function renderBarMonthChart(labels, values) {
      const ctx = document.getElementById('chart-month');
      if (!ctx) return;
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: 'rgba(250,82,15,0.75)',
            borderColor: '#fa520f',
            borderWidth: 1,
            borderRadius: 3,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { font: { family: 'Arial', size: 11 }, color: '#9c9c9c' } },
            y: { beginAtZero: true, grid: { color: 'rgba(127,99,21,0.06)' }, ticks: { font: { family: 'Arial', size: 11 }, color: '#9c9c9c' } }
          }
        }
      });
    }

    function renderBarWeekdayChart(values) {
      const ctx = document.getElementById('chart-weekday');
      if (!ctx) return;
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'],
          datasets: [{
            data: values,
            backgroundColor: chartColors.slice(0, 7),
            borderWidth: 1,
            borderRadius: 3,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { font: { family: 'Arial', size: 11 }, color: '#9c9c9c' } },
            y: { beginAtZero: true, grid: { color: 'rgba(127,99,21,0.06)' }, ticks: { font: { family: 'Arial', size: 11 }, color: '#9c9c9c' } }
          }
        }
      });
    }

    function renderPieChart(contrats) {
      const ctx = document.getElementById('chart-pie');
      if (!ctx) return;
      const top = contrats.slice(0, 7);
      new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: top.map(c => contratLabel(c[0])),
          datasets: [{ data: top.map(c => c[1]), backgroundColor: chartColors.slice(0, top.length), borderWidth: 2, borderColor: '#ffffff' }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '60%',
          plugins: {
            legend: { position: 'right', labels: { font: { family: 'Arial', size: 12 }, padding: 10, usePointStyle: true, pointStyleWidth: 8, boxHeight: 8 } }
          }
        }
      });
    }

    function renderExpChart(data) {
      const ctx = document.getElementById('chart-exp');
      if (!ctx) return;
      const levels = ['junior', 'mid', 'senior', 'unknown'];
      const labels = ['Junior', 'Mid', 'Senior', 'Indéfini'];
      const counts = levels.map(l => data.filter(r => r.experience_level === l).length);
      const colors = ['#22c55e', '#3b82f6', '#fa520f', '#d1d5db'];
      new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{ data: counts, backgroundColor: colors, borderWidth: 2, borderColor: '#ffffff' }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '60%',
          plugins: {
            legend: { position: 'right', labels: { font: { family: 'Arial', size: 12 }, padding: 10, usePointStyle: true, pointStyleWidth: 8, boxHeight: 8 } }
          }
        }
      });
    }

    /* ================================================================
       DEBOUNCE
       ================================================================ */
    function debounce(fn, ms) {
      let t;
      return function(...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), ms); };
    }

    /* ================================================================
       DEMO DATA
       ================================================================ */
    function generateDemoData() {
      const titles    = ['Data Scientist Senior', 'ML Engineer', 'Data Analyst', 'Ingénieur IA', 'Data Engineer', 'Chef de projet Data', 'Développeur Python / ML', 'Consultant Big Data', 'NLP Researcher', 'MLOps Engineer'];
      const companies = ['Société Générale', 'BNP Paribas', 'Thales', 'Capgemini', 'Atos', 'Orange', 'Dataiku', 'OVHcloud', 'Dassault Systèmes', 'Criteo', 'Mistral AI', 'Ubisoft', null];
      const lieux     = ['Paris 75', 'Lyon 69', 'Toulouse 31', 'Nantes 44', 'Bordeaux 33', 'Lille 59', 'Marseille 13', 'Rennes 35', 'Sophia Antipolis 06', 'Grenoble 38'];
      const contrats  = ['CDI', 'CDI', 'CDI', 'CDD', 'CDD', 'MIS', 'LIB', 'FRA'];
      const expLevels = ['junior', 'mid', 'senior', 'unknown'];
      const rows = [];
      for (let i = 0; i < 187; i++) {
        const daysAgo        = Math.floor(Math.random() * 30);
        const collectDaysAgo = Math.max(0, daysAgo - Math.floor(Math.random() * 2));
        const hasSalary      = Math.random() > 0.35;
        const salMin         = hasSalary ? 30000 + Math.floor(Math.random() * 40000) : null;
        const salMax         = hasSalary ? salMin + 5000 + Math.floor(Math.random() * 20000) : null;
        const d  = new Date(); d.setDate(d.getDate() - daysAgo);
        const dc = new Date(); dc.setDate(dc.getDate() - collectDaysAgo);
        rows.push({
          id: `${100000 + i}ABC`,
          intitule: titles[Math.floor(Math.random() * titles.length)],
          type_contrat: contrats[Math.floor(Math.random() * contrats.length)],
          lieu_travail: lieux[Math.floor(Math.random() * lieux.length)],
          entreprise_nom: companies[Math.floor(Math.random() * companies.length)],
          experience_level: expLevels[Math.floor(Math.random() * expLevels.length)],
          salaire_min: salMin,
          salaire_max: salMax,
          salaire_libelle: hasSalary ? `Annuel de ${salMin} Euros à ${salMax} Euros` : null,
          date_creation: d.toISOString(),
          date_collecte: dc.toISOString()
        });
      }
      return rows;
    }

    /* ================================================================
       INIT
       ================================================================ */
    (async function init() {
      const shell = document.getElementById('app');
      try {
        if (SUPABASE_URL === 'SUPABASE_URL' || SUPABASE_KEY === 'SUPABASE_ANON_KEY') {
          console.warn('Supabase credentials not set — using demo data');
          allData = generateDemoData();
        } else {
          allData = await fetchAllOffres();
        }
        filtered = [...allData];
        render(filtered);
      } catch (err) {
        shell.innerHTML = `
          <header class="header">
            <div class="header-left">
              <img src="assets/logo-block.svg" alt="logo"/>
              <h2>Offres Data / IA</h2>
            </div>
          </header>
          <div class="error-state">Erreur de chargement : ${err.message}</div>
        `;
      }
    })();
  </script>
</body>
</html>
